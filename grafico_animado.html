<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Produção por Mês</title>
<style>
  body { margin:0; background:#111; color:#eee; font-family:Arial,sans-serif; padding:20px; box-sizing:border-box; }
  h1 { font-size:80px; font-weight:400; color:#ccc; margin:0 0 12px; }
  .mes-btns { display:flex; flex-wrap:wrap; gap:6px; margin-bottom:14px; }
  .mes-btn { font-size:25px; padding:4px 12px; border-radius:20px; cursor:pointer;
              border:1px solid #444; background:#222; color:#aaa; }
  .mes-btn.ativo { background:#000000; color:#fff; border-color:#F5FFFA; }
  .ctrl { display:flex; align-items:center; gap:10px; margin-bottom:14px; flex-wrap:wrap; }
  button { background:#222; color:#eee; border:1px solid #444; padding:7px 18px;
            font-size:30px; border-radius:6px; cursor:pointer; }
  button:hover { background:#333; }
  input[type=range] { flex:1; min-width:120px; accent-color:#F5FFFA; }
  .day { font-size:32px; font-weight:600; min-width:80px; }
  .legend { display:flex; flex-wrap:wrap; gap:16px; font-size:25px; color:#aaa; margin-bottom:10px; }
  .dot { width:10px; height:10px; border-radius:2px; display:inline-block; margin-right:4px; vertical-align:middle; }
  #chartWrap { position:relative; width:100%; height:780px; }
</style>
</head>
<body>
<h1 id="mesTitle">—</h1>
<div class="mes-btns" id="mesBtns"></div>
<div class="ctrl">

  <span class="day" id="dayLabel">—</span>
  <input type="range" id="slider" min="0" max="0" value="0">
</div>
<div class="legend">

</div>

let mesAtual=0, frame=0, timer=null, playing=false;

const btnsDiv = document.getElementById('mesBtns');
meses.forEach((m,i) => {
  const b = document.createElement('button');
  b.className = 'mes-btn' + (i===0?' ativo':'');
  b.textContent = m.nome.slice(0,3);
  b.addEventListener('click', () => { stop(); trocarMes(i); });
  btnsDiv.appendChild(b);
});

const slider = document.getElementById('slider');
const chart = new Chart(document.getElementById('chart').getContext('2d'), {
  type:'bar',
  data:{ labels:[], datasets:[
    {label:'Prod. acumulada', data:[], backgroundColor:[], order:2},
    {label:'Meta acumulada',  data:[], type:'line', borderColor:'#00CED1', borderWidth:6, pointRadius:0, fill:false, order:1},
    {label:'Sem hora extra',  data:[], type:'line', borderColor:'#F5FFFA', borderWidth:6, pointRadius:0, fill:false, order:1},
  ]},
  options:{
    responsive:true, maintainAspectRatio:false, animation:{duration:50},
    plugins:{legend:{display:false}, tooltip:{mode:'index',intersect:false}},
    scales:{
      x:{ticks:{color:'#aaa',font:{size:40},autoSkip:false,maxRotation:0}, grid:{display:false}},
      y:{ticks:{color:'#aaa',font:{size:40},callback:v=>(v/1000).toFixed(0)+'k'}, grid:{color:'rgba(255,255,255,0.08)'}}
    }
  }
});

function trocarMes(i){
  mesAtual=i; frame=0;
  slider.max = meses[i].rows.length-1;
  slider.value = 0;
  document.getElementById('mesTitle').textContent = meses[i].nome + ' 2025';
  document.querySelectorAll('.mes-btn').forEach((b,j)=>b.classList.toggle('ativo',j===i));
  render(0);
}

function render(f){
  const rows = meses[mesAtual].rows;
  const s = rows.slice(0,f+1);
  chart.data.labels = s.map(r=>r.label);
  chart.data.datasets[0].data = s.map(r=>r.prod);
  chart.data.datasets[0].backgroundColor = s.map(r => r.prod < r.meta ? '#FF0000' : '#32CD32');
  chart.data.datasets[1].data = s.map(r=>r.meta);
  chart.data.datasets[2].data = s.map(r=>r.she);
  chart.update('none');
  document.getElementById('dayLabel').textContent = 'Dia '+rows[f].label;
  slider.value = f;
}

function tick(){
  const total = meses[mesAtual].rows.length;
  if(frame >= total-1){
    if(mesAtual < meses.length-1){
      clearInterval(timer);
      setTimeout(()=>{ trocarMes(mesAtual+1); if(playing) clearInterval(timer); timer=setInterval(tick,140); },900);
    } else { stop(); }
    return;
  }
  frame++; render(frame);
}

function play(){ clearInterval(timer); playing=true; document.getElementById('btnPlay').textContent='⏸ Pause'; timer=setInterval(tick,140); }
function stop(){ playing=false; clearInterval(timer); document.getElementById('btnPlay').textContent='▶ Play'; }

document.getElementById('btnPlay').addEventListener('click',()=>playing?stop():play());
document.getElementById('btnReset').addEventListener('click',()=>{stop();trocarMes(mesAtual);});
slider.addEventListener('input',e=>{stop();frame=+e.target.value;render(frame);});

trocarMes(0);
</script>
